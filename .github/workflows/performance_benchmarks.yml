name: Continuous Performance Benchmarks

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays at Midnight UTC
  workflow_dispatch:

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Workflow dispatch triggered. Forcing benchmark run."
          else
            LATEST_COMMIT_TIMESTAMP=$(git log -1 --format="%ct")
            CURRENT_TIMESTAMP=$(date +%s)
            DIFF=$((CURRENT_TIMESTAMP - LATEST_COMMIT_TIMESTAMP))
            # Check for commits within the last 7 days (604800 seconds)
            if [ "$DIFF" -le 604800 ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Latest commit is within the last 7 days ($DIFF seconds ago). Proceeding with benchmarks."
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "Latest commit is older than 7 days ($DIFF seconds ago). Skipping benchmarks."
            fi
          fi

  benchmark:
    needs: check_changes
    if: needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES }}
        run: echo $GOOGLE_SERVICES > app/google-services.json

      - name: Run Macrobenchmarks in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: aosp_atd
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew :baselineprofile:connectedCheck -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=Macrobenchmark
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REDIRECT_URI: ${{ secrets.TRAKT_REDIRECT_URI }}
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
          SIMKL_REDIRECT_URI: ${{ secrets.SIMKL_REDIRECT_URI }}

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            **/build/outputs/connected_android_test_additional_output/**/*.json
            **/build/outputs/connected_android_test_additional_output/**/*.perfetto-trace
